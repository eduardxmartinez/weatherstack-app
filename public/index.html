<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Consulta el clima actual de cualquier localidad." />
    <title>Clima actual | WeatherStack</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="page-shell">
      <header>
        <a class="brand" href="/" aria-label="Inicio de Clima">☀ <span>clima</span></a>
        <p class="eyebrow">WEATHERSTACK · TIEMPO REAL</p>
        <h1>El clima en tiempo real.</h1>
        <p class="intro">Escribe una ciudad, región o país para conocer las condiciones actuales.</p>
      </header>

      <section class="search-panel" aria-labelledby="search-title">
        <h2 id="search-title">Busca una localidad</h2>
        <form id="weather-form" novalidate>
          <label class="sr-only" for="location">Ciudad, estado o país</label>
          <input id="location" name="location" type="search" placeholder="Ej. Hermosillo, Sonora" autocomplete="off" required />
          <button type="submit">Consultar clima <span aria-hidden="true">→</span></button>
        </form>
        <p id="feedback" class="feedback" role="status" aria-live="polite"></p>
      </section>

      <section id="weather-result" class="weather-card hidden" aria-live="polite"></section>
    </main>
    <footer>Datos meteorológicos proporcionados por WeatherStack.</footer>
    <script src="app.js"></script>
  </body>
</html>
